name: Android Build

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        required: false
        type: string
        default: "24"
      package-manager:
        description: "Package manager (npm, yarn)"
        required: false
        type: string
        default: "npm"
      working-directory:
        description: "Working directory for the project"
        required: false
        type: string
        default: "."
      java-version:
        description: "Java version"
        required: false
        type: string
        default: "17"
      java-distribution:
        description: "Java distribution"
        required: false
        type: string
        default: "zulu"
      build-type:
        description: "Build type (apk, bundle)"
        required: false
        type: string
        default: "bundle"
      build-variant:
        description: "Build variant (release, debug)"
        required: false
        type: string
        default: "release"
      upload-artifact:
        description: "Whether to upload build artifact"
        required: false
        type: boolean
        default: true
      artifact-name:
        description: "Name for the uploaded artifact"
        required: false
        type: string
        default: "android-build"
    secrets:
      ANDROID_KEYSTORE_BASE64:
        description: "Base64 encoded keystore file"
        required: true
      ANDROID_KEYSTORE_PASSWORD:
        description: "Keystore password"
        required: true
      ANDROID_KEY_ALIAS:
        description: "Key alias in the keystore"
        required: true
      ANDROID_KEY_PASSWORD:
        description: "Key password"
        required: true
    outputs:
      build-number:
        description: "Build number (versionCode)"
        value: ${{ jobs.build.outputs.build-number }}
      version:
        description: "App version (versionName)"
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build-number: ${{ steps.build-info.outputs.build-number }}
      version: ${{ steps.build-info.outputs.version }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}
          cache: gradle

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install JS dependencies (yarn)
        if: inputs.package-manager == 'yarn'
        run: yarn install --frozen-lockfile

      - name: Install JS dependencies (npm)
        if: inputs.package-manager == 'npm'
        run: npm ci

      - name: Decode keystore
        working-directory: ${{ inputs.working-directory }}/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles(format('{0}/android/**/*.gradle*', inputs.working-directory), format('{0}/android/gradle-wrapper.properties', inputs.working-directory)) }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build APK
        if: inputs.build-type == 'apk'
        working-directory: ${{ inputs.working-directory }}/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            -PRELEASE_STORE_FILE=release.keystore \
            -PRELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD \
            -PRELEASE_KEY_ALIAS=$KEY_ALIAS \
            -PRELEASE_KEY_PASSWORD=$KEY_PASSWORD

      - name: Build AAB
        if: inputs.build-type == 'bundle'
        working-directory: ${{ inputs.working-directory }}/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease \
            -PRELEASE_STORE_FILE=release.keystore \
            -PRELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD \
            -PRELEASE_KEY_ALIAS=$KEY_ALIAS \
            -PRELEASE_KEY_PASSWORD=$KEY_PASSWORD

      - name: Extract build info
        id: build-info
        working-directory: ${{ inputs.working-directory }}/android
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s+"\K[^"]+' app/build.gradle 2>/dev/null || echo "0.0.0")
          VERSION_CODE=$(grep -oP 'versionCode\s+\K\d+' app/build.gradle 2>/dev/null || echo "0")
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "build-number=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        if: inputs.upload-artifact && inputs.build-type == 'apk'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.working-directory }}/android/app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Upload AAB artifact
        if: inputs.upload-artifact && inputs.build-type == 'bundle'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.working-directory }}/android/app/build/outputs/bundle/release/*.aab
          retention-days: 7
