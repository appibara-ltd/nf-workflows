name: Android Deploy to Google Play

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        required: false
        type: string
        default: "24"
      working-directory:
        description: "Working directory for the project"
        required: false
        type: string
        default: "."
      java-version:
        description: "Java version"
        required: false
        type: string
        default: "17"
      java-distribution:
        description: "Java distribution"
        required: false
        type: string
        default: "zulu"
      track:
        description: "Google Play track (internal, alpha, beta, production)"
        required: false
        type: string
        default: "internal"
      package-name:
        description: "Android package name"
        required: true
        type: string
      ruby-version:
        description: "Ruby version for Fastlane"
        required: false
        type: string
        default: "3.2"
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: true
      ANDROID_KEYSTORE_PASSWORD:
        required: true
      ANDROID_KEY_ALIAS:
        required: true
      ANDROID_KEY_PASSWORD:
        required: true
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:
        description: "Google Play service account JSON key (base64 encoded)"
        required: true

jobs:
  deploy-play-store:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: ${{ inputs.java-distribution }}
          cache: gradle

      - name: Setup Ruby ${{ inputs.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: true
          working-directory: ${{ inputs.working-directory }}/android

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Decode keystore
        working-directory: ${{ inputs.working-directory }}/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Decode Google Play service account key
        working-directory: ${{ inputs.working-directory }}/android
        run: |
          echo "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" | base64 --decode > google-play-key.json

      - name: Build AAB
        working-directory: ${{ inputs.working-directory }}/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease \
            -PRELEASE_STORE_FILE=release.keystore \
            -PRELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD \
            -PRELEASE_KEY_ALIAS=$KEY_ALIAS \
            -PRELEASE_KEY_PASSWORD=$KEY_PASSWORD

      - name: Upload to Google Play
        working-directory: ${{ inputs.working-directory }}/android
        run: |
          bundle exec fastlane supply \
            --aab app/build/outputs/bundle/release/app-release.aab \
            --track ${{ inputs.track }} \
            --package_name ${{ inputs.package-name }} \
            --json_key google-play-key.json \
            --skip_upload_metadata \
            --skip_upload_images \
            --skip_upload_screenshots

      - name: Cleanup credentials
        if: always()
        working-directory: ${{ inputs.working-directory }}/android
        run: |
          rm -f app/release.keystore
          rm -f google-play-key.json
