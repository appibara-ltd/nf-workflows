name: Build App

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Working directory for the project"
        required: false
        type: string
        default: "."
      sdk_version:
        description: "Nativeflow sdk version"
        default: "0.0.1"
        type: string
      sdk_location:
        description: "Nativeflow sdk location to download"
        default: "nativeflow.app"
        type: string
      name:
        description: "Name of your application"
        default: "NativeFlow Application"
        type: string
      version:
        description: "Semver version"
        default: "1.0.0"
        type: string
      bundle_id:
        description: "Unique bundle id of your app"
        default: "app.nativeflow.base"
        type: string
      bundle_version:
        description: "Bundle version of your app"
        default: "1"
        type: string
      owner:
        description: "Application owner"
        default: "NativeFlow"
        type: string
      xcode_path:
        description: "Xcode path"
        default: "/Applications/Xcode_26.2.app"
        type: string
      build_ios:
        description: "Build iOS"
        default: true
        type: boolean
      build_android:
        description: "Build Android"
        default: true
        type: boolean
    secrets:
      WORKSPACE_NAME: 
        required: false
      SCHEME: 
        required: false
      APPLE_DEVELOPER_PORTAL_TEAM_ID: 
        required: true
      APPLE_STORE_CONNECT_TEAM_ID: 
        required: true
      APPLE_KEY: 
        required: true
      APPLE_KEY_ID: 
        required: true
      APPLE_ISSUER_ID: 
        required: true
      MATCH_REPO_URL: 
        required: true
      MATCH_REPO_USERNAME: 
        required: true
      MATCH_PASSWORD: 
        required: true
      MATCH_REPO_BRANCH: 
        required: true
      MATCH_REPO_PRIVATE_KEY: 
        required: true
      BEFORE_ALL: 
        required: false
      REPO_GITHUB_TOKEN: 
        required: false
      PLAY_STORE_CREDENTIALS: 
        required: false
      ANDROID_KEYSTORE: 
        required: false
      ANDROID_KEYSTORE_PASSWORD: 
        required: false
      ANDROID_KEY_ALIAS: 
        required: false
      ANDROID_KEY_PASSWORD: 
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FASTLANE_FASTFILE: ./fastlane/Fastfile
  WORKSPACE_NAME: ${{ secrets.WORKSPACE_NAME }}
  SCHEME: ${{ secrets.SCHEME }}
  APP_IDENTIFIER: ${{ inputs.bundle_id }}
  APPLE_DEVELOPER_PORTAL_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_PORTAL_TEAM_ID }}
  APPLE_STORE_CONNECT_TEAM_ID: ${{ secrets.APPLE_STORE_CONNECT_TEAM_ID }}
  APPLE_KEY: ${{ secrets.APPLE_KEY }}
  APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
  APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
  MATCH_REPO_URL: ${{ secrets.MATCH_REPO_URL }}
  MATCH_REPO_USERNAME: ${{ secrets.MATCH_REPO_USERNAME }}
  MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
  MATCH_REPO_BRANCH: ${{ secrets.MATCH_REPO_BRANCH }}
  MATCH_REPO_PRIVATE_KEY: ${{ secrets.MATCH_REPO_PRIVATE_KEY }}
  BEFORE_ALL: ${{ secrets.BEFORE_ALL }}
  GITHUB_TOKEN: ${{ secrets.REPO_GITHUB_TOKEN }}
  PLAY_STORE_CREDENTIALS: ${{ secrets.PLAY_STORE_CREDENTIALS }}
  ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
  ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

permissions:
  contents: write  # This is the critical line for releases
  pull-requests: read  # Required to list/read PRs for changelogs

jobs:
  iOS:
    runs-on: macos-26
    if: inputs.build_ios
    steps:
      - name: Set Xcode version 
        run: sudo xcode-select -s ${{ inputs.xcode_path }}

      - uses: actions/checkout@v6

      - name: Setup Base
        uses: appibara-ltd/nf-workflows/.github/actions/setup-base@main
        with:
          sdk_version: ${{ inputs.sdk_version }}
          sdk_location: ${{ inputs.sdk_location }}

      - name: Setup Fastlane
        uses: appibara-ltd/nf-workflows/.github/actions/setup-fastlane@main

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          tool_versions: |
            ruby 3.4.8
            nodejs 24

      - name: Get npm cache directory
        id: npm-cache-dir
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Node Modules
        run: npm ci

      - name: Cache vendor/bundle
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Install Gems
        run: bundle install

      # React Native related
      - name: Install iOS Pods
        run: npm run pod-install

      - name: Setup NF Application
        uses: appibara-ltd/nf-workflows/.github/actions/setup-nf-application@main
        with:
          name: ${{ inputs.name }}
          version: ${{ inputs.version }}
          bundle_id: ${{ inputs.bundle_id }}
          bundle_version: ${{ inputs.bundle_version }}
          owner: ${{ inputs.owner }}

      # React Native related
      - name: Configure Node Path for Xcode
        run: |
          NODE_PATH=$(command -v node)
          echo "export NODE_BINARY=$NODE_PATH" > ios/.xcode.env.local
          echo "Xcode will use Node at: $NODE_PATH"

      - name: Build & Sign & Publish to TestFlight
        run: bundle exec fastlane ios internal

      - name: Upload Artifacts
        if: env.RELEASE_ASSET_PATH != ''
        uses: actions/upload-artifact@v7
        with:
          name: archive-ipa
          path: ${{ env.RELEASE_ASSET_PATH }}


  Android:
    runs-on: ubuntu-latest
    if: inputs.build_android
    steps:
      - uses: actions/checkout@v6

      - name: Setup Base
        uses: appibara-ltd/nf-workflows/.github/actions/setup-base@main
        with:
          sdk_version: ${{ inputs.sdk_version }}
          sdk_location: ${{ inputs.sdk_location }}

      - name: Setup Fastlane
        uses: appibara-ltd/nf-workflows/.github/actions/setup-fastlane@main

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          tool_versions: |
            ruby 3.4.8
            nodejs 24
            java zulu-17

      - name: Get npm cache directory
        id: npm-cache-dir
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Node Modules
        run: npm ci

      - name: Cache vendor/bundle
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Install Gems
        run: bundle install

      - name: Setup NF Application
        uses: appibara-ltd/nf-workflows/.github/actions/setup-nf-application@main
        with:
          name: ${{ inputs.name }}
          version: ${{ inputs.version }}
          bundle_id: ${{ inputs.bundle_id }}
          bundle_version: ${{ inputs.bundle_version }}
          owner: ${{ inputs.owner }}

      - name: Build & Sign & Publish to Google Play Store
        run: bundle exec fastlane android internal

      - name: Upload Artifacts
        if: env.RELEASE_ASSET_PATH != ''
        uses: actions/upload-artifact@v7
        with:
          name: archive-apk
          path: ${{ env.RELEASE_ASSET_PATH }}
