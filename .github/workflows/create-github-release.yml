name: Create GitHub Release

on:
  workflow_call:
    inputs:
      tag-name:
        description: "Tag name for the release"
        required: true
        type: string
      release-name:
        description: "Release name"
        required: true
        type: string
      body:
        description: "Release notes body"
        required: false
        type: string
        default: ""
      draft:
        description: "Whether release is a draft"
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Whether release is a prerelease"
        required: false
        type: boolean
        default: false
      generate-release-notes:
        description: "Auto-generate release notes"
        required: false
        type: boolean
        default: true
      artifact-name:
        description: "Name of the artifact to download and attach"
        required: false
        type: string
        default: ""
      artifact-path:
        description: "Path pattern for files to attach as release assets"
        required: false
        type: string
        default: ""
    outputs:
      release-id:
        description: "ID of the created release"
        value: ${{ jobs.release.outputs.release-id }}
      release-url:
        description: "URL of the created release"
        value: ${{ jobs.release.outputs.release-url }}

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.id }}
      release-url: ${{ steps.create-release.outputs.html_url }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        if: inputs.artifact-name != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ./release-assets

      - name: Create GitHub Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag-name }}
          name: ${{ inputs.release-name }}
          body: ${{ inputs.body }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: ${{ inputs.generate-release-notes }}
          files: |
            ${{ inputs.artifact-path != '' && inputs.artifact-path || './release-assets/**/*' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
