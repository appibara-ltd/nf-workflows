name: iOS Build

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        required: false
        type: string
        default: "24"
      working-directory:
        description: "Working directory for the project"
        required: false
        type: string
        default: "."
      export-method:
        description: "Xcode export method (app-store, ad-hoc, development, enterprise)"
        required: false
        type: string
        default: "app-store"
      scheme:
        description: "Xcode scheme name"
        required: true
        type: string
      workspace-name:
        description: "Xcode workspace name (without .xcworkspace extension)"
        required: true
        type: string
      ruby-version:
        description: "Ruby version for Fastlane"
        required: false
        type: string
        default: "3.2"
      xcode-path:
        description: "Xcode app path (e.g. /Applications/Xcode_26.2.app)"
        required: false
        type: string
        default: "/Applications/Xcode_26.2.app"
      fastlane-lane:
        description: "Fastlane lane to run (create_archive, create_ipa)"
        required: false
        type: string
        default: "create_archive"
      upload-artifact:
        description: "Whether to upload build artifact"
        required: false
        type: boolean
        default: true
      artifact-name:
        description: "Name for the uploaded artifact"
        required: false
        type: string
        default: "ios-build"
    secrets:
      APP_IDENTIFIER:
        required: true
      APPLE_DEVELOPER_PORTAL_TEAM_ID:
        required: true
      APPLE_STORE_CONNECT_TEAM_ID:
        required: true
      APPLE_KEY:
        required: true
      APPLE_KEY_ID:
        required: true
      APPLE_ISSUER_ID:
        required: true
      MATCH_REPO_URL:
        required: true
      MATCH_REPO_USERNAME:
        required: true
      MATCH_PASSWORD:
        required: true
      MATCH_REPO_BRANCH:
        required: true
      MATCH_REPO_PRIVATE_KEY:
        required: true
    outputs:
      build-number:
        description: "Build number"
        value: ${{ jobs.build.outputs.build-number }}
      version:
        description: "App version"
        value: ${{ jobs.build.outputs.version }}
      artifact-path:
        description: "Path to the build artifact"
        value: ${{ jobs.build.outputs.artifact-path }}

jobs:
  build:
    runs-on: macos-latest
    outputs:
      build-number: ${{ steps.build-info.outputs.build-number }}
      version: ${{ steps.build-info.outputs.version }}
      artifact-path: ${{ steps.build-info.outputs.artifact-path }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    env:
      APP_IDENTIFIER: ${{ secrets.APP_IDENTIFIER }}
      APPLE_DEVELOPER_PORTAL_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_PORTAL_TEAM_ID }}
      APPLE_STORE_CONNECT_TEAM_ID: ${{ secrets.APPLE_STORE_CONNECT_TEAM_ID }}
      APPLE_KEY: ${{ secrets.APPLE_KEY }}
      APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
      APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
      MATCH_REPO_URL: ${{ secrets.MATCH_REPO_URL }}
      MATCH_REPO_USERNAME: ${{ secrets.MATCH_REPO_USERNAME }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_REPO_BRANCH: ${{ secrets.MATCH_REPO_BRANCH }}
      MATCH_REPO_PRIVATE_KEY: ${{ secrets.MATCH_REPO_PRIVATE_KEY }}
      SCHEME: ${{ inputs.scheme }}
      WORKSPACE_NAME: ${{ inputs.workspace-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s ${{ inputs.xcode-path }}

      - name: Setup Ruby ${{ inputs.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: true
          working-directory: ${{ inputs.working-directory }}/ios

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ${{ inputs.working-directory }}/ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles(format('{0}/ios/Podfile.lock', inputs.working-directory)) }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install CocoaPods
        working-directory: ${{ inputs.working-directory }}/ios
        run: bundle exec pod install

      - name: Run Fastlane ${{ inputs.fastlane-lane }}
        working-directory: ${{ inputs.working-directory }}/ios
        run: bundle exec fastlane ${{ inputs.fastlane-lane }} export_method:${{ inputs.export-method }}

      - name: Extract build info
        id: build-info
        working-directory: ${{ inputs.working-directory }}/ios
        run: |
          echo "build-number=$(cat ../githubactions/ios/build_number.txt 2>/dev/null || echo '0')" >> $GITHUB_OUTPUT
          echo "version=$(cat ../githubactions/ios/version.txt 2>/dev/null || echo '0.0.0')" >> $GITHUB_OUTPUT
          echo "artifact-path=$(pwd)/../githubactions/ios" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        if: inputs.upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.working-directory }}/githubactions/ios/
          retention-days: 7
