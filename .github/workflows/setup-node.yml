name: Setup Node.js Environment

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "24"
      working-directory:
        description: "Working directory for the project"
        required: false
        type: string
        default: "."
      cache-pods:
        description: "Whether to cache CocoaPods dependencies"
        required: false
        type: boolean
        default: false
      install-pods:
        description: "Whether to install CocoaPods dependencies"
        required: false
        type: boolean
        default: false
      pods-directory:
        description: "Relative path to iOS directory containing Podfile"
        required: false
        type: string
        default: "ios"

jobs:
  setup:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}

      - name: Install dependencies
        run: npm ci

      - name: Cache CocoaPods
        if: inputs.cache-pods
        uses: actions/cache@v4
        with:
          path: ${{ inputs.working-directory }}/${{ inputs.pods-directory }}/Pods
          key: pods-${{ runner.os }}-${{ hashFiles(format('{0}/{1}/Podfile.lock', inputs.working-directory, inputs.pods-directory)) }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install CocoaPods
        if: inputs.install-pods
        working-directory: ${{ inputs.working-directory }}/${{ inputs.pods-directory }}
        run: bundle exec pod install
